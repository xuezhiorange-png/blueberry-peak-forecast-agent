services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: blueberry_peak
      POSTGRES_USER: blueberry_app
      POSTGRES_PASSWORD: change-me-in-local-env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blueberry_app -d blueberry_peak"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
