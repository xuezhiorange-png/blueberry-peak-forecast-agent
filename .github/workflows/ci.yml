name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: blueberry_peak
          POSTGRES_USER: blueberry_app
          POSTGRES_PASSWORD: change-me-in-local-env
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blueberry_app -d blueberry_peak"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy backend/app

      - name: Pytest
        env:
          APP_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: blueberry_peak
          POSTGRES_USER: blueberry_app
          POSTGRES_PASSWORD: change-me-in-local-env
        run: pytest
