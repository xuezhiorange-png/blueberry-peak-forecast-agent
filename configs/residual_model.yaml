model_family: hist_gradient_boosting_quantile
model_version: task10-residual-v1
feature_schema_version: task10-features-v1
artifact_schema_version: task10-artifact-v1

quantiles:
  - 0.5
  - 0.8
  - 0.9

random_seed: 20260626

estimator:
  learning_rate: 0.05
  max_iter: 300
  max_leaf_nodes: 31
  max_depth: 6
  min_samples_leaf: 10
  l2_regularization: 0.1
  early_stopping: true
  validation_fraction: 0.2
  n_iter_no_change: 20
  tol: 0.0001

split:
  strategy: leave_one_season_out
  version: task10-split-v1

missing_values:
  version: task10-missing-v1

categorical_encoding:
  version: task10-categorical-v1
  unknown_policy: explicit_bucket

projection:
  nonnegative: true
  quantile_monotonic: cumulative_max
  version: task10-projection-v1

eligibility:
  min_training_rows: 30
  min_seasons: 2
  min_factories: 2
  max_validation_wmape: 0.35
  require_improvement_over_structural: true
  max_fallback_rate: 0.2
